#  usb_path: /dev/ttyACM0
#  config_path: /srv/homeassistant/src/python-openzwave/openzwave/config
#  device_config: !include zwave_device_config.yaml
# new_entity_ids: false
##End of Z-Wave Device Configuration#############

#################################################
#INCLUDES
#################################################
#history: !include history.yaml
logbook: !include logbook.yaml
recorder: !include recorder.yaml
logger: !include logger.yaml
sensor: !include_dir_list sensor/
sensor rest: !include_dir_merge_list sensor/
automation: !include automations.yaml
ios: !include ios.yaml
ios split: !include_dir_merge_named packages/
group: !include groups.yaml
group split: !include_dir_merge_named packages/
homekit: !include homekit.yaml
mqtt: !include mqtt.yaml
notify: !include notify.yaml
#notify split: !include_dir_merge_named notify/
#zone: !include zones.yaml
zone split: !include_dir_merge_named packages/
script: !include scripts.yaml
script split: !include_dir_merge_named scripts/
scene: !include scenes.yaml
template: !include templates.yaml
input_boolean: !include input_boolean.yaml
input_datetime: !include input_datetime.yaml
input_number: !include input_number.yaml
input_select: !include input_select.yaml
input_text: !include input_text.yaml
#person: !include person.yaml
#timer: !include_dir_merge_named packages/
#switch: !include switch.yaml
##End of INCLUDES################################
