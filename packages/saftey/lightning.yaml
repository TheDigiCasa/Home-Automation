---
###############################################################################
# 🧠 SENTRY GUARD V6.2 - STABLE PACKAGE (INDY + SHELBYVILLE)
# Documentation: https://github.com/TheDigiCasa/Home-Automation/blob/main/packages/saftey/lightning.md
###############################################################################

############################
# INPUTS
############################
input_boolean:
  sentry_indy_lightning_snooze:
    name: Indy Lightning Snooze

  sentry_shelby_lightning_snooze:
    name: Shelbyville Lightning Snooze

  sentry_auto_protect_enabled:
    name: Auto Protect

  sentry_voice_alerts:
    name: Voice Alerts

input_select:
  sentry_user_role:
    name: Sentry User Role
    options:
      - normal
      - elevated
      - admin
    initial: normal

############################
# THRESHOLDS
############################
input_number:
  sentry_danger_close:
    name: Danger Close Distance
    min: 1
    max: 50
    step: 1
    initial: 10

  sentry_warning_distance:
    name: Warning Distance
    min: 10
    max: 100
    step: 5
    initial: 25

############################
# TEMPLATE SENSORS
############################
template:

  #################################################
  # 📉 TREND
  #################################################
  - trigger:
      - platform: time_pattern
        minutes: "/1"
    sensor:
      - name: sentry_indy_lightning_trend
        unique_id: sentry_indy_lightning_trend
        state: >
          {% set current = states('sensor.blitzortung_lightning_distance') | float(999) %}
          {% set prev = state_attr(this.entity_id, 'last') | float(current) %}
          {% if current < prev %} approaching
          {% elif current > prev %} departing
          {% else %} steady
          {% endif %}
        attributes:
          last: "{{ states('sensor.blitzortung_lightning_distance') | float(999) }}"

      - name: sentry_shelby_lightning_trend
        unique_id: sentry_shelby_lightning_trend
        state: >
          {% set current = states('sensor.lightning_distance_shelby') | float(999) %}
          {% set prev = state_attr(this.entity_id, 'last') | float(current) %}
          {% if current < prev %} approaching
          {% elif current > prev %} departing
          {% else %} steady
          {% endif %}
        attributes:
          last: "{{ states('sensor.lightning_distance_shelby') | float(999) }}"

  #################################################
  # ⏱️ ETA
  #################################################
  - sensor:
      - name: sentry_indy_lightning_eta
        unique_id: sentry_indy_lightning_eta
        unit_of_measurement: "min"
        state: >
          {% set d = states('sensor.blitzortung_lightning_distance') | float(999) %}
          {% if d < 50 %}
            {{ (d / 0.5) | int }}
          {% else %}
            0
          {% endif %}

      - name: sentry_shelby_lightning_eta
        unique_id: sentry_shelby_lightning_eta
        unit_of_measurement: "min"
        state: >
          {% set d = states('sensor.lightning_distance_shelby') | float(999) %}
          {% if d < 50 %}
            {{ (d / 0.5) | int }}
          {% else %}
            0
          {% endif %}

############################
# SCRIPT
############################
script:
  sentry_v6_shutdown:
    alias: Sentry Graceful Shutdown
    sequence:
      - service: notify.mobile_app
        data:
          message: "⚡ Sentry shutting down devices due to lightning risk"

############################
# AUTOMATION (BRAIN)
############################
automation:
  - id: sentry_guard_v6
    alias: "⚡ Sentry Guard v6.2 - Autonomous Lightning Defense"
    mode: restart

    trigger:
      - platform: state
        entity_id:
          - sensor.blitzortung_lightning_distance
          - sensor.lightning_distance_shelby

      - platform: time_pattern
        minutes: "/15"

      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: INDY_LIGHTNING_SNOOZE
        id: snooze_indy

      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: SVILLE_LIGHTNING_SNOOZE
        id: snooze_sville

    variables:
      indy_distance: "{{ states('sensor.blitzortung_lightning_distance') | float(999) }}"
      shelby_distance: "{{ states('sensor.lightning_distance_shelby') | float(999) }}"
      closest_strike: "{{ [indy_distance, shelby_distance] | min }}"
      shelby_online: "{{ shelby_distance != 999 }}"
      indy_online: "{{ indy_distance != 999 }}"
      #################################################
      # 📍 LOCATION DECISION
      #################################################
      is_indy: "{{ indy_distance <= shelby_distance }}"    
      location_name: >
        {% if is_indy %}Indy{% else %}Shelbyville{% endif %}
      target_group: >
        {% if is_indy %}
          notify.mobile_app_indy
        {% else %}
          notify.mobile_app_shelby
        {% endif %}
      snooze_action: >
        {% if is_indy %}
          INDY_LIGHTNING_SNOOZE
        {% else %}
          SVILLE_LIGHTNING_SNOOZE
        {% endif %}
      #################################################
      # 📏 DYNAMIC DATA
      #################################################
      distance: "{{ closest_strike | round(1) }}"
      eta: >
        {% if is_indy %}
          {{ states('sensor.sentry_indy_lightning_eta') }}
        {% else %}
          {{ states('sensor.sentry_shelby_lightning_eta') }}
        {% endif %}
      trend: >
        {% if is_indy %}
          {{ states('sensor.sentry_indy_lightning_trend') }}
        {% else %}
          {{ states('sensor.sentry_shelby_lightning_trend') }}
        {% endif %}
      #################################################
      # 🚨 ALERT LEVEL
      #################################################
      alert_level: >
        {% if closest_strike < 5 %}
          critical
        {% elif closest_strike < 10 %}
          warning
        {% else %}
          awareness
        {% endif %}
#######################################################        
#Conditions Block
#######################################################
    condition:
      #################################################
      # 🛡️ MASTER ENABLE
      #################################################
      - condition: state
        entity_id: input_boolean.sentry_auto_protect_enabled
        state: "on"
      #################################################
      # 🔕 SNOOZE BLOCK (ONLY blocks alerts, not logs)
      #################################################
      - condition: template
        value_template: >
          {% set indy_snoozed = is_state('input_boolean.sentry_indy_lightning_snooze','on') %}
          {% set shelby_snoozed = is_state('input_boolean.sentry_shelby_lightning_snooze','on') %}
          {% set indy = states('sensor.blitzortung_lightning_distance') | float(999) %}
          {% set shelby = states('sensor.lightning_distance_shelby') | float(999) %}
          
          {% if indy < shelby %}
            {{ not indy_snoozed }}
          {% else %}
            {{ not shelby_snoozed }}
          {% endif %}
    action:
      - choose:
          #################################################
          # 🚨 CRITICAL  (<5)
          #################################################
          - conditions:
              - condition: template
                value_template: " {{ (closest_strike < 5) or (alert_level == 'critical') }}"
            sequence:
              # ✅ LOCAL VARIABLES LIVE HERE
#              - variables:
#                  is_indy: "{{ indy_distance <= shelby_distance }}"
#                  target_group: >
#                    {% if is_indy %}
#                      notify.mobile_app_indy
#                    {% else %}
#                      notify.mobile_app_shelby
#                    {% endif %}
              # ✅ THEN YOUR NOTIFICATION
              - service: "{{ target_group }}"
                data:
                  title: >
                    ⚡ Sentry Guard - {{ location_name }}
                  message: |
                    {% if alert_level == 'critical' %}
                      🚨 CRITICAL STRIKE
                    {% elif alert_level == 'warning' %}
                      ⚠️ Lightning Nearby
                    {% else %}
                      🌩️ Storm Activity
                    {% endif %}
                    📍 Location: {{ location_name }}

                    📏 Distance: {{ distance }} miles
                    
                    ⏱️ ETA: {{ eta }} min
                    
                    📉 Trend: {{ trend }}
                  data:
                    #################################################
                    # 🔘 ACTION BUTTONS
                    #################################################
                    actions:
                      - action: "{{ snooze_action }}"
                        title: "🔕 Snooze Alerts"
                    #################################################
                    # 🔊 SOUND LOGIC
                    #################################################
                    push:
                      sound: >
                        {% if alert_level == 'critical' %}
                          alarm
                        {% elif alert_level == 'warning' %}
                          default
                        {% else %}
                          none
                        {% endif %}
                    #################################################
                    # 📱 HIGH PRIORITY (CRITICAL ONLY)
                    #################################################
                    ttl: 0
                    priority: >
                      {% if alert_level == 'critical' %}
                        high
                      {% else %}
                        normal
                      {% endif %}
          #################################################
          # ⚠️ WARNING (<10)
          #################################################
          - conditions:
              - condition: template
                value_template: "{{ (closest_strike < 10) or (alert_level == 'warning') }}"
            sequence:
              #################################################
              # 📲 SEND NOTIFICATION
              #################################################
              - service: "{{ target_group }}"
                data:
                  title: >
                    ⚡ Sentry Guard - {{ location_name }}
                  message: |
                    {% if alert_level == 'critical' %}
                      🚨 CRITICAL STRIKE
                    {% elif alert_level == 'warning' %}
                      ⚠️ Lightning Nearby
                    {% else %}
                      🌩️ Storm Activity
                    {% endif %}
                    📍 Location: {{ location_name }}

                    📏 Distance: {{ distance }} miles
                    
                    ⏱️ ETA: {{ eta }} min
                    
                    📉 Trend: {{ trend }}
                  data:
                    #################################################
                    # 🔘 ACTION BUTTONS
                    #################################################
                    actions:
                      - action: "{{ snooze_action }}"
                        title: "🔕 Snooze Alerts"
                    #################################################
                    # 🔊 SOUND LOGIC
                    #################################################
                    push:
                      sound: >
                        {% if alert_level == 'critical' %}
                          alarm
                        {% elif alert_level == 'warning' %}
                          default
                        {% else %}
                          none
                        {% endif %}
                    #################################################
                    # 📱 HIGH PRIORITY (CRITICAL ONLY)
                    #################################################
                    ttl: 0
                    priority: >
                      {% if alert_level == 'critical' %}
                        high
                      {% else %}
                        normal
                      {% endif %}

          #################################################
          # 🌩️ AWARENESS (<20)
          #################################################
          - conditions:
              - condition: template
                value_template: "{{ closest_strike < 20 }}"
            sequence:
              - service: logbook.log
                data:
                  name: "Sentry Guard"
                  message: "Awareness zone active"
          #################################################
          # 🚨 SENSOR FAILURE
          #################################################
          - conditions:
              - condition: template
                value_template: "{{ not shelby_online }}"
            sequence:
              - service: logbook.log
                data:
                  name: "Sentry Guard"
                  message: "⚠️ Shelbyville sensor OFFLINE"
          #################################################
          # 🔕 SNOOZE ACTIONS
          #################################################
          - conditions:
              - condition: trigger
                id: snooze_indy
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sentry_indy_lightning_snooze
          - conditions:
              - condition: trigger
                id: snooze_sville
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sentry_shelby_lightning_snooze
        #################################################
        # 🐛 DEFAULT (DEBUG)
        #################################################
        default:
          - service: logbook.log
            data:
              name: "Sentry Guard"
              message: >
                Idle. Indy: {{ indy_distance }} | Shelby: {{ shelby_distance }}
